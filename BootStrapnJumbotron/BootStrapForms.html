<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Jumbotron Forms Example</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  </head>
  <body>
<div class="container">
  <div class="jumbotron">

<h1>Please Fill out the Information Below:</h1>
<form>
  <div class="form-row">
    <div class="form-group col-md-6">
      <label for="inputEmail4"><strong>Email:</strong></label>
      <input type="email" class="form-control" id="inputEmail4" placeholder="name@example.com">
    </div>
    <div class="form-group col-md-6">
      <label for="inputPassword4"><strong>Password:</strong></label>
      <input type="password" class="form-control" id="inputPassword4">
    </div>
  </div>
  <div class="form-group col-md-6"">
    <label for="inputAddress"><strong>Address:</strong></label>
    <input type="text" class="form-control" id="inputAddress" placeholder="1234 Main St">
  </div>
  <div class="form-group col-md-6">
    <label for="inputAddress2"><strong>Address 2:</strong></label>
    <input type="text" class="form-control" id="inputAddress2" placeholder="Apartment, studio, or floor">
  </div>
  <div class="form-row">
    <div class="form-group col-md-4">
      <label for="inputCity"><strong>City:</strong></label>
      <input type="text" class="form-control" id="inputCity">
    </div>
    <div class="form-group col-md-4">
      <label for="inputProvince"><strong>Province:</strong></label>
      <select id="inputProvince" class="form-control">
        <option selected>Choose...Province</option>
        <option value="Alberta">ALBERTA</option>
        <option value="British Columbia">BRITISH COLUMBIA</option>
        <option value="Manitoba">MANITOBA</option>
        <option value="Saskatchewant">SASKATCHEWAN</option>
        <option value="Ontario">ONTARIO</option>
        <option value="Quebec">QUEBEC</option>
        <option value="PEI">PEI</option>
        <option value="Nova Scotia">NOVA SCOTIO</option>
        <option value="New Foundland & Labridor">NEW FOUNDLAND & LABRIDOR</option>
        <option value="North West Territories">NORTH WEST TERRITORIES</option>
      </select>
    </div>
    <div class="form-group col-md-2">
      <label for="inputZip"><strong>Postal Code:</strong></label>
      <input type="text" class="form-control" id="inputZip">
    </div>
  </div>
  <div class="form-group">
    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="gridCheck">
      <label class="form-check-label" for="gridCheck">
        Check me out
      </label>
    </div>
  </div>
  <button type="submit" class="btn btn-primary">Sign in</button>
</form>
</div>
</div>
</body>
</html>
