<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Sample Matrimonial App</title>
    <link rel="stylesheet" href="abc.css">
  </head>
  <body>
    <form action='reg.html' method='GET'>
    <h1>Registration Form</h1>
    <h2>All Fields are Mandatory</h2>
    <label for="Name">Name:&nbsp&nbsp&nbsp</label>
    <input id="Name" type="text" name="name" placeholder="Enter Name"><br>
    <label for="Email">Email:&nbsp&nbsp&nbsp</label>
    <input id="Email" type="text" name="email" placeholder="Enter Your Email"><br>
    <label for="Age">Age:&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp</label>
    <input type="text" name="" placeholder="Enter Age"><br>

    <h2>Are You Interested in Dating:</h2>
    <label for="yes">Yes</label>
    <input id="yes" type="radio" name="radio">
    <label for="no">No</label>
    <input id="no" type="radio" name="radio">
    <h2>Your Expected GF:</h2>
    <select class="GF" name="">
    <option value="KatrinaK">Katrina Kaif</option>
    <option value="Mallikas">Mallika Sherawat</option>
    <option value="KajalA">Kajal Agarwal</option>
    </select>
    <h2>How Many Marriages you want:</h2>
    <select class="M" name="">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
    </select>
    <h3>Are You Heavy Alcoholic:</h3>
    <label for="yes">Yes</label>
    <input id="yes" type="checkbox" name="alc" value="">
    <label for="no">no</label>
    <input id="no" type="radio" name="alc" value="">
    <label for="only">Only on Week-Ends</label>
    <input id="only" type="radio" name="alc" value="">
    <label for="texta"><h2>Your Preferences and Extra Information<h2></label>
    <textarea id="texta" name="extraInfo" rows="8" cols="80">
    </textarea><br>
    <input type="submit" name="" value="Submit">
    </form>
  </body>
</html>
